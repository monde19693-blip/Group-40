{% extends 'base.html' %}
{% block title %}Invalid QR Code{% endblock %}
{% block page_title %}Invalid QR Code{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 text-center">
    <div class="card p-4">
      <div style="width:80px;height:80px;background:#fde8e8;border-radius:50%;
                  display:flex;align-items:center;justify-content:center;
                  margin:0 auto 1rem;font-size:2.5rem">❌</div>
      <h3 class="fw-700 mb-1" style="color:#9b1c1c">Invalid QR Code</h3>
      <p class="text-muted mb-3" style="font-size:.88rem">{{ reason }}</p>
      <a href="{{ url_for('checkin.scan_page') }}"
         class="btn btn-outline-secondary" style="border-radius:8px">
        ← Back to Scanner
      </a>
    </div>
  </div>
</div>
{% endblock %}
